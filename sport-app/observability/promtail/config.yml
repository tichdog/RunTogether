server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: sport-app
    static_configs:
      - targets:
          - localhost
        labels:
          job: sport-app
          service: sport-app
          env: development
          __path__: /var/log/sport-app/*.log
    pipeline_stages:
      - json:
          expressions:
            level: level
            time: time
            msg: msg
            status: status
            service: service
            env: env
      - timestamp:
          source: time
          format: RFC3339Nano
      - labels:
          level:
          status:
          service:
          env:
