services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: sport_training
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '${POSTGRES_PORT:-5433}:5432'
    volumes:
      - sport_postgres_data:/var/lib/postgresql/data
      - ./sport-backend/src/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./sport-backend/src/db/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d sport_training']
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./sport-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 4000
      CLIENT_ORIGIN: ${CLIENT_ORIGIN:-http://localhost:5173,http://localhost:5174}
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/sport_training
      JWT_SECRET: change-this-jwt-secret-at-least-32-characters
      JWT_ACCESS_EXPIRES_IN: 15m
      ACCESS_COOKIE_NAME: sport_access_token
      REFRESH_COOKIE_NAME: sport_refresh_token
      ACCESS_COOKIE_MAX_AGE_SECONDS: 900
      REFRESH_COOKIE_MAX_AGE_SECONDS: 2592000
      LOG_LEVEL: info
      LOG_FILE: logs/backend.log
      UPLOAD_DIR: public/uploads
      MAX_UPLOAD_BYTES: 3145728
      CRON_SECRET: change-this-cron-secret-at-least-32-characters
      CRON_URL: http://backend:4000/api/cron/workouts
      CRON_INTERVAL_MS: 3600000
      TURNSTILE_SECRET_KEY: 1x0000000000000000000000000000000AA
      NEXT_TELEMETRY_DISABLED: 1
    ports:
      - '${BACKEND_PORT:-4000}:4000'
      - '${PRISMA_STUDIO_PORT:-5555}:5555'
    volumes:
      - ./sport-backend:/app
      - sport_backend_node_modules:/app/node_modules
      - sport_backend_next:/app/.next
      - sport_backend_prisma_generated:/app/src/generated/prisma
      - sport_backend_uploads:/app/public/uploads
      - sport_backend_logs:/app/logs
    command: sh -c "npm run prisma:generate && npm run dev -- -H 0.0.0.0"

  frontend:
    build:
      context: ./sport-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_PROXY_TARGET: http://backend:4000
      VITE_TURNSTILE_SITE_KEY: 1x00000000000000000000AA
    ports:
      - '${FRONTEND_PORT:-5173}:5173'
    volumes:
      - ./sport-frontend:/app
      - sport_frontend_node_modules:/app/node_modules
    command: npm run dev -- --host 0.0.0.0

  loki:
    image: grafana/loki:latest
    restart: unless-stopped
    command: -config.file=/etc/loki/config.yml
    ports:
      - '${LOKI_PORT:-3100}:3100'
    volumes:
      - ./sport-backend/observability/loki/config.yml:/etc/loki/config.yml:ro
      - sport_loki_data:/loki

  promtail:
    image: grafana/promtail:latest
    restart: unless-stopped
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
      - backend
    volumes:
      - ./sport-backend/observability/promtail/config.yml:/etc/promtail/config.yml:ro
      - sport_backend_logs:/var/log/sport-backend:ro

  grafana:
    image: grafana/grafana-oss:11.6.0
    restart: unless-stopped
    depends_on:
      - loki
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_DEFAULT_THEME: light
      GF_ANALYTICS_REPORTING_ENABLED: 'false'
      GF_ANALYTICS_CHECK_FOR_UPDATES: 'false'
      GF_ANALYTICS_CHECK_FOR_PLUGIN_UPDATES: 'false'
      GF_PLUGINS_PREINSTALL_DISABLED: 'true'
      GF_PLUGINS_DISABLE_PLUGINS: grafana-lokiexplore-app,grafana-pyroscope-app,grafana-exploretraces-app,grafana-metricsdrilldown-app
    ports:
      - '${GRAFANA_PORT:-3001}:3000'
    volumes:
      - sport_grafana_data:/var/lib/grafana
      - ./sport-backend/observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./sport-backend/observability/grafana/dashboards:/var/lib/grafana/dashboards:ro

volumes:
  sport_postgres_data:
  sport_backend_node_modules:
  sport_backend_next:
  sport_backend_prisma_generated:
  sport_backend_uploads:
  sport_backend_logs:
  sport_frontend_node_modules:
  sport_loki_data:
  sport_grafana_data:
